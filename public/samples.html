<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Set Samples</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      header {
        padding: 20px 28px;
        background: #0b1224;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 {
        font-size: 20px;
        margin: 0;
      }
      header a {
        color: #60a5fa;
        text-decoration: none;
        font-size: 14px;
      }
      .container {
        padding: 24px 28px 40px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
      }
      .card {
        background: #111c33;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        padding: 10px;
        text-align: center;
      }
      .card img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .card .name {
        font-size: 12px;
        color: #cbd5f5;
        word-break: break-word;
      }
      .empty {
        padding: 24px;
        border: 1px dashed rgba(148, 163, 184, 0.4);
        border-radius: 12px;
        text-align: center;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Test Set Samples</h1>
      <a href="/">Back to Dashboard</a>
    </header>
    <div class="container">
      <div id="samplesGrid" class="grid">
        <div class="empty">Loading samples...</div>
      </div>
    </div>
    <script>
      const grid = document.getElementById('samplesGrid');
      fetch('/images/index.json')
        .then(res => res.json())
        .then(items => {
          if (!Array.isArray(items) || items.length === 0) {
            grid.innerHTML = '<div class="empty">No samples found in images/</div>';
            return;
          }
          grid.innerHTML = '';
          items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            const img = document.createElement('img');
            img.src = item.url;
            img.alt = item.name || 'sample';
            const name = document.createElement('div');
            name.className = 'name';
            name.textContent = item.name || 'sample';
            card.appendChild(img);
            card.appendChild(name);
            grid.appendChild(card);
          });
        })
        .catch(() => {
          grid.innerHTML = '<div class="empty">Failed to load samples.</div>';
        });
    </script>
  </body>
  </html>
